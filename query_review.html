<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Query Decoupling Review - 中文金融 IF Benchmark</title>
<style>
  :root {
    --bg: #0f1117;
    --card: #1a1d27;
    --border: #2a2d3a;
    --text: #e0e0e0;
    --text-dim: #888;
    --accent: #4f8ff7;
    --green: #34d399;
    --red: #f87171;
    --yellow: #fbbf24;
    --orange: #fb923c;
    --cyan: #22d3ee;
    --purple: #a78bfa;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.6;
  }
  .header {
    position: sticky; top: 0; z-index: 100;
    background: var(--card);
    border-bottom: 1px solid var(--border);
    padding: 16px 24px;
  }
  .header h1 { font-size: 18px; font-weight: 600; margin-bottom: 12px; }
  .stats { display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 12px; }
  .stat-badge {
    padding: 4px 12px; border-radius: 6px; font-size: 13px; font-weight: 500;
  }
  .stat-total { background: #1e3a5f; color: var(--accent); }
  .stat-bare { background: #1a3a2a; color: var(--green); }
  .stat-decoupled { background: #3a2a1a; color: var(--orange); }
  .stat-approved { background: #1a3a2a; color: var(--green); }
  .stat-rejected { background: #3a1a1a; color: var(--red); }
  .stat-pending { background: #3a3a1a; color: var(--yellow); }

  .filters { display: flex; gap: 12px; flex-wrap: wrap; align-items: center; }
  .filter-group { display: flex; align-items: center; gap: 6px; }
  .filter-group label { font-size: 13px; color: var(--text-dim); }
  select, input[type="text"] {
    background: var(--bg); color: var(--text); border: 1px solid var(--border);
    border-radius: 6px; padding: 6px 10px; font-size: 13px; outline: none;
  }
  select:focus, input:focus { border-color: var(--accent); }
  .filter-btn {
    padding: 6px 14px; border-radius: 6px; border: 1px solid var(--border);
    background: var(--card); color: var(--text); cursor: pointer; font-size: 13px;
  }
  .filter-btn:hover { border-color: var(--accent); }

  .container { max-width: 1060px; margin: 0 auto; padding: 16px; }
  .card {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 10px; padding: 16px 20px; margin-bottom: 14px;
    transition: border-color 0.2s;
  }
  .card:hover { border-color: #444; }
  .card.approved { border-left: 4px solid var(--green); }
  .card.rejected { border-left: 4px solid var(--red); }

  .card-header {
    display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 10px;
  }
  .card-meta { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
  .tag { padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: 500; }
  .tag-source { background: #1e3a5f; color: #7db8f7; }
  .tag-task { background: #2d1e5f; color: #b07df7; }
  .tag-id { background: #333; color: #aaa; }
  .tag-bare { background: #1a3a2a; color: var(--green); }
  .tag-decoupled { background: #3a2a1a; color: var(--orange); }

  .section-label {
    font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px;
    margin-bottom: 4px; margin-top: 10px;
  }
  .label-original { color: var(--text-dim); }
  .label-base { color: var(--cyan); }
  .label-constraints { color: var(--orange); }

  .text-block {
    font-size: 13px; white-space: pre-wrap; word-break: break-all;
    padding: 10px 12px; border-radius: 6px; margin-bottom: 6px;
    max-height: 160px; overflow-y: auto; line-height: 1.7;
  }
  .text-original { background: #16181f; border: 1px solid #2a2d3a; }
  .text-base { background: #0f2027; border: 1px solid #1a4050; }
  .text-constraints { background: #271a0a; border: 1px solid #4a3020; }

  .constraint-item {
    display: inline-block; background: #3a2a1a; color: var(--orange);
    padding: 2px 8px; border-radius: 4px; font-size: 12px; margin: 2px 4px 2px 0;
  }

  .card-note { font-size: 12px; color: var(--text-dim); margin: 6px 0; }

  .card-actions { display: flex; gap: 8px; align-items: center; margin-top: 10px; }
  .btn {
    padding: 6px 16px; border-radius: 6px; border: none;
    cursor: pointer; font-size: 13px; font-weight: 500; transition: opacity 0.2s;
  }
  .btn:hover { opacity: 0.85; }
  .btn-approve { background: var(--green); color: #000; }
  .btn-reject { background: var(--red); color: #fff; }
  .btn-reset { background: #555; color: #fff; }
  .btn-export { background: var(--accent); color: #fff; padding: 8px 20px; }

  .status-text { font-size: 13px; font-weight: 500; margin-left: 8px; }
  .status-approved { color: var(--green); }
  .status-rejected { color: var(--red); }

  .export-bar {
    position: fixed; bottom: 0; left: 0; right: 0;
    background: var(--card); border-top: 1px solid var(--border);
    padding: 12px 24px; display: flex; justify-content: space-between;
    align-items: center; z-index: 100;
  }
  .export-info { font-size: 13px; color: var(--text-dim); }

  .pagination { display: flex; justify-content: center; gap: 8px; padding: 20px 0 80px; }
  .page-btn {
    padding: 6px 14px; border-radius: 6px; border: 1px solid var(--border);
    background: var(--card); color: var(--text); cursor: pointer; font-size: 13px;
  }
  .page-btn:hover { border-color: var(--accent); }
  .page-btn.active { background: var(--accent); color: #fff; }
  .page-btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .empty-state { text-align: center; padding: 60px; color: var(--text-dim); }

  .toggle-original {
    font-size: 12px; color: var(--accent); cursor: pointer;
    text-decoration: underline; margin-left: 8px;
  }
</style>
</head>
<body>

<div class="header">
  <h1>Query Decoupling Review - base_instruction / constraints 拆解审核</h1>
  <div class="stats" id="stats"></div>
  <div class="filters">
    <div class="filter-group">
      <label>数据源:</label>
      <select id="filterSource"><option value="all">全部</option></select>
    </div>
    <div class="filter-group">
      <label>拆解状态:</label>
      <select id="filterBare">
        <option value="all">全部</option>
        <option value="bare">Bare (无约束)</option>
        <option value="decoupled">Decoupled (有约束)</option>
      </select>
    </div>
    <div class="filter-group">
      <label>审核:</label>
      <select id="filterStatus">
        <option value="all">全部</option>
        <option value="pending">待审</option>
        <option value="approved">已通过</option>
        <option value="rejected">已拒绝</option>
      </select>
    </div>
    <div class="filter-group">
      <label>搜索:</label>
      <input type="text" id="searchInput" placeholder="关键词..." style="width:160px">
    </div>
    <button class="filter-btn" onclick="approveAllFiltered()">批量通过</button>
    <button class="filter-btn" onclick="rejectAllFiltered()">批量拒绝</button>
  </div>
</div>

<div class="container" id="cardContainer"></div>
<div class="pagination" id="pagination"></div>

<div class="export-bar">
  <div class="export-info" id="exportInfo"></div>
  <div style="display:flex;gap:8px;">
    <button class="btn btn-export" onclick="exportApproved()">导出已通过 (JSON)</button>
    <button class="btn" style="background:#555;color:#fff" onclick="exportAll()">导出全部含状态</button>
  </div>
</div>

<script>
const DATA_PATH = 'data/query_pool/expansion/decoupled_queries.json';
const PAGE_SIZE = 15;
let allData = [];
let decisions = {};
let currentPage = 1;

function loadDecisions() {
  const saved = localStorage.getItem('decouple_review_decisions');
  if (saved) decisions = JSON.parse(saved);
}
function saveDecisions() {
  localStorage.setItem('decouple_review_decisions', JSON.stringify(decisions));
}

async function init() {
  loadDecisions();
  try {
    const resp = await fetch(DATA_PATH);
    allData = await resp.json();
  } catch (e) {
    document.getElementById('cardContainer').innerHTML =
      `<div class="empty-state">
        <p>无法加载数据。请启动 HTTP 服务：</p>
        <p style="margin-top:8px;color:#4f8ff7;font-family:monospace">
          cd paper_for_financial_if_benchmark && python3 -m http.server 8080
        </p>
      </div>`;
    return;
  }
  populateFilters();
  render();
}

function populateFilters() {
  const sources = [...new Set(allData.map(d => d.source))].sort();
  const sel = document.getElementById('filterSource');
  sources.forEach(s => { const o = document.createElement('option'); o.value = s; o.textContent = s; sel.appendChild(o); });
  sel.addEventListener('change', () => { currentPage = 1; render(); });
  document.getElementById('filterBare').addEventListener('change', () => { currentPage = 1; render(); });
  document.getElementById('filterStatus').addEventListener('change', () => { currentPage = 1; render(); });
  document.getElementById('searchInput').addEventListener('input', () => { currentPage = 1; render(); });
}

function getFiltered() {
  const src = document.getElementById('filterSource').value;
  const bare = document.getElementById('filterBare').value;
  const status = document.getElementById('filterStatus').value;
  const search = document.getElementById('searchInput').value.toLowerCase();
  return allData.filter(d => {
    if (src !== 'all' && d.source !== src) return false;
    if (bare === 'bare' && d.is_bare !== true) return false;
    if (bare === 'decoupled' && d.is_bare !== false) return false;
    const ds = decisions[d.query_id] || 'pending';
    if (status !== 'all' && ds !== status) return false;
    const text = (d.query_text || '') + (d.base_instruction || '') + (d.query_id || '');
    if (search && !text.toLowerCase().includes(search)) return false;
    return true;
  });
}

function render() {
  const filtered = getFiltered();
  const totalPages = Math.max(1, Math.ceil(filtered.length / PAGE_SIZE));
  if (currentPage > totalPages) currentPage = totalPages;
  const start = (currentPage - 1) * PAGE_SIZE;
  const pageData = filtered.slice(start, start + PAGE_SIZE);

  const totalApproved = allData.filter(d => decisions[d.query_id] === 'approved').length;
  const totalRejected = allData.filter(d => decisions[d.query_id] === 'rejected').length;
  const totalPending = allData.length - totalApproved - totalRejected;
  const totalBare = allData.filter(d => d.is_bare === true).length;
  const totalDec = allData.filter(d => d.is_bare === false).length;

  document.getElementById('stats').innerHTML = `
    <span class="stat-badge stat-total">总计 ${allData.length}</span>
    <span class="stat-badge stat-bare">Bare ${totalBare}</span>
    <span class="stat-badge stat-decoupled">Decoupled ${totalDec}</span>
    <span class="stat-badge stat-approved">通过 ${totalApproved}</span>
    <span class="stat-badge stat-rejected">拒绝 ${totalRejected}</span>
    <span class="stat-badge stat-pending">待审 ${totalPending}</span>
    <span class="stat-badge" style="background:#2a2a3a;color:#aaa">筛选 ${filtered.length}</span>
  `;

  const container = document.getElementById('cardContainer');
  if (pageData.length === 0) {
    container.innerHTML = '<div class="empty-state">没有匹配的数据</div>';
  } else {
    container.innerHTML = pageData.map(d => {
      const st = decisions[d.query_id] || 'pending';
      const stClass = st === 'approved' ? 'approved' : st === 'rejected' ? 'rejected' : '';
      const stHtml = st === 'approved' ? '<span class="status-text status-approved">&#10003; 通过</span>'
        : st === 'rejected' ? '<span class="status-text status-rejected">&#10007; 拒绝</span>' : '';

      const bareTag = d.is_bare
        ? '<span class="tag tag-bare">BARE</span>'
        : `<span class="tag tag-decoupled">DECOUPLED (${(d.constraints||[]).length})</span>`;

      const origText = escapeHtml(d.query_text || '');
      const baseText = escapeHtml(d.base_instruction || d.query_text || '');
      const constraints = d.constraints || [];
      const note = d.note || '';

      let constraintHtml = '';
      if (constraints.length > 0) {
        constraintHtml = `
          <div class="section-label label-constraints">CONSTRAINTS (${constraints.length})</div>
          <div style="margin-bottom:6px">${constraints.map(c => `<span class="constraint-item">${escapeHtml(c)}</span>`).join('')}</div>`;
      }

      const showOriginal = d.is_bare === false;

      return `
        <div class="card ${stClass}">
          <div class="card-header">
            <div class="card-meta">
              <span class="tag tag-id">${d.query_id}</span>
              <span class="tag tag-source">${d.source}</span>
              <span class="tag tag-task">${d.task_type}</span>
              ${bareTag}
            </div>
            ${stHtml}
          </div>
          ${showOriginal ? `
            <div class="section-label label-original">ORIGINAL <span class="toggle-original" onclick="this.parentElement.nextElementSibling.style.display=this.parentElement.nextElementSibling.style.display==='none'?'block':'none'">展开/收起</span></div>
            <div class="text-block text-original" style="display:none">${origText}</div>
          ` : ''}
          <div class="section-label label-base">BASE INSTRUCTION</div>
          <div class="text-block text-base">${baseText}</div>
          ${constraintHtml}
          ${note ? `<div class="card-note">${escapeHtml(note)}</div>` : ''}
          <div class="card-actions">
            <button class="btn btn-approve" onclick="decide('${d.query_id}','approved')">通过</button>
            <button class="btn btn-reject" onclick="decide('${d.query_id}','rejected')">拒绝</button>
            ${st !== 'pending' ? `<button class="btn btn-reset" onclick="decide('${d.query_id}','reset')">重置</button>` : ''}
          </div>
        </div>`;
    }).join('');
  }

  // Pagination
  const pagDiv = document.getElementById('pagination');
  let ph = `<button class="page-btn" onclick="goPage(${currentPage-1})" ${currentPage<=1?'disabled':''}>&#8592;</button>`;
  const ms = 7; let ps = Math.max(1,currentPage-3), pe = Math.min(totalPages,ps+ms-1);
  if(pe-ps<ms-1) ps=Math.max(1,pe-ms+1);
  for(let i=ps;i<=pe;i++) ph+=`<button class="page-btn ${i===currentPage?'active':''}" onclick="goPage(${i})">${i}</button>`;
  ph+=`<button class="page-btn" onclick="goPage(${currentPage+1})" ${currentPage>=totalPages?'disabled':''}>&#8594;</button>`;
  ph+=`<span style="color:#888;font-size:13px;margin-left:8px">${currentPage}/${totalPages}</span>`;
  pagDiv.innerHTML = ph;

  document.getElementById('exportInfo').textContent =
    `已审核 ${totalApproved+totalRejected}/${allData.length}  |  通过率 ${totalApproved?((totalApproved/(totalApproved+totalRejected))*100).toFixed(1):0}%`;
}

function decide(qid, action) {
  if (action==='reset') delete decisions[qid]; else decisions[qid]=action;
  saveDecisions(); render();
}
function goPage(p) {
  const f=getFiltered(), tp=Math.max(1,Math.ceil(f.length/PAGE_SIZE));
  if(p<1||p>tp)return; currentPage=p; render(); window.scrollTo({top:0,behavior:'smooth'});
}
function approveAllFiltered() {
  const f=getFiltered(); if(!confirm(`批量通过 ${f.length} 条？`))return;
  f.forEach(d=>{decisions[d.query_id]='approved';}); saveDecisions(); render();
}
function rejectAllFiltered() {
  const f=getFiltered(); if(!confirm(`批量拒绝 ${f.length} 条？`))return;
  f.forEach(d=>{decisions[d.query_id]='rejected';}); saveDecisions(); render();
}
function exportApproved() {
  const a=allData.filter(d=>decisions[d.query_id]==='approved');
  if(!a.length){alert('无已通过数据');return;} downloadJSON(a,'approved_decoupled_queries.json');
}
function exportAll() {
  downloadJSON(allData.map(d=>({...d,review_status:decisions[d.query_id]||'pending'})),'all_decoupled_with_status.json');
}
function downloadJSON(data,fn) {
  const b=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
  const u=URL.createObjectURL(b), a=document.createElement('a');
  a.href=u;a.download=fn;document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(u);
}
function escapeHtml(s) { const d=document.createElement('div');d.textContent=s;return d.innerHTML; }
document.addEventListener('keydown',e=>{if(e.key==='ArrowLeft')goPage(currentPage-1);if(e.key==='ArrowRight')goPage(currentPage+1);});
init();
</script>
</body>
</html>
