<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FinIF Benchmark Viewer</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:#f5f5f5;color:#333;display:flex;height:100vh}
.sidebar{width:280px;min-width:280px;background:#1a1a2e;color:#eee;overflow-y:auto;padding:16px 0;display:flex;flex-direction:column}
.sidebar h2{padding:0 16px 12px;font-size:15px;color:#8888cc;border-bottom:1px solid #333;margin-bottom:8px}
.sidebar .stats{padding:4px 16px 12px;font-size:12px;color:#888;border-bottom:1px solid #333;margin-bottom:8px}
.tab-bar{display:flex;padding:0 8px 8px;gap:4px;border-bottom:1px solid #333;margin-bottom:8px}
.tab-btn{flex:1;padding:6px 0;text-align:center;background:#16213e;color:#aaa;border:none;border-radius:4px;cursor:pointer;font-size:12px;font-weight:600}
.tab-btn.active{background:#4a9eff;color:#fff}
.tab-btn:hover:not(.active){background:#1e2d4a}
.case-list{flex:1;overflow-y:auto}
.case-item{padding:10px 16px;cursor:pointer;border-left:3px solid transparent;transition:all .15s}
.case-item:hover{background:#16213e}
.case-item.active{background:#16213e;border-left-color:#4a9eff}
.case-item .case-id{font-weight:600;font-size:13px}
.case-item .case-meta{font-size:11px;color:#888;margin-top:2px;display:flex;align-items:center;gap:6px}
.badge{display:inline-block;padding:1px 6px;border-radius:3px;font-size:10px;font-weight:600}
.badge-easy{background:#2d6a4f;color:#b7e4c7}
.badge-medium{background:#6a4c2d;color:#e4d4b7}
.badge-hard{background:#6a2d2d;color:#e4b7b7}
.main{flex:1;overflow-y:auto;padding:24px 32px}
.section{background:#fff;border-radius:8px;padding:20px;margin-bottom:16px;box-shadow:0 1px 3px rgba(0,0,0,.08)}
.section h3{font-size:14px;color:#666;margin-bottom:12px;text-transform:uppercase;letter-spacing:.5px}
.case-header{display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.case-header h1{font-size:22px}
.meta-tags{display:flex;gap:8px;flex-wrap:wrap}
.meta-tag{display:inline-block;padding:3px 10px;border-radius:4px;font-size:12px;background:#f0f0f0}
.text-block{background:#fafafa;border:1px solid #e8e8e8;border-radius:6px;padding:16px;font-size:14px;line-height:1.7;white-space:pre-wrap;word-break:break-word}
.collapsible{cursor:pointer;user-select:none}
.collapsible::before{content:"\25B6";margin-right:8px;font-size:11px;transition:transform .2s;display:inline-block}
.collapsible.open::before{transform:rotate(90deg)}
.collapsible-content{display:none;margin-top:12px}
.collapsible-content.show{display:block}
table{width:100%;border-collapse:collapse;font-size:13px}
th{background:#f8f8f8;text-align:left;padding:8px 10px;font-weight:600;border-bottom:2px solid #e0e0e0}
td{padding:8px 10px;border-bottom:1px solid #f0f0f0;vertical-align:top}
tr:hover{background:#fafafa}
.type-badge{display:inline-block;padding:1px 6px;border-radius:3px;font-size:11px;font-weight:600}
.type-badge-hard{background:#e8f0fe;color:#1a73e8}
.type-badge-soft{background:#fef3e8;color:#e87a1a}
.review-actions{display:flex;gap:6px;align-items:center}
.btn-pass,.btn-comment{border:none;border-radius:4px;padding:4px 10px;font-size:11px;cursor:pointer;font-weight:600}
.btn-pass{background:#e8fee8;color:#1a8e1a}
.btn-pass:hover{background:#c8eec8}
.btn-pass.active{background:#2d6a4f;color:#fff}
.btn-comment{background:#fff3e0;color:#e65100}
.btn-comment:hover{background:#ffe0b2}
.btn-comment.active{background:#e65100;color:#fff}
.comment-input{display:none;margin-top:6px}
.comment-input.show{display:block}
.comment-input textarea{width:100%;border:1px solid #e0e0e0;border-radius:4px;padding:6px 8px;font-size:12px;resize:vertical;min-height:40px}
.review-status{font-size:11px;padding:2px 6px;border-radius:3px;margin-left:4px}
.status-passed{background:#e8fee8;color:#2d6a4f}
.status-commented{background:#fff3e0;color:#e65100}
.export-bar{position:fixed;bottom:16px;right:32px;z-index:100}
.export-btn{background:#1a73e8;color:#fff;border:none;border-radius:6px;padding:10px 20px;font-size:14px;cursor:pointer;box-shadow:0 2px 8px rgba(0,0,0,.2)}
.export-btn:hover{background:#1557b0}
.empty-state{text-align:center;padding:80px 20px;color:#999}
.empty-state h2{font-size:18px;margin-bottom:8px}
.group-header{padding:8px 16px 4px;font-size:11px;color:#666}
</style>
</head>
<body>
<div class="sidebar">
  <h2>FinIF Benchmark</h2>
  <div class="stats" id="sidebar-stats"></div>
  <div class="tab-bar">
    <button class="tab-btn active" onclick="switchTab('T1')">T1 (27)</button>
    <button class="tab-btn" onclick="switchTab('T2')">T2 (15)</button>
    <button class="tab-btn" onclick="switchTab('T3')">T3 (12)</button>
    <button class="tab-btn" onclick="switchTab('ALL')">All (54)</button>
  </div>
  <div class="case-list" id="case-list"></div>
</div>
<div class="main" id="main-content">
  <div class="empty-state"><h2>Select a case</h2><p>54 cases across T1 + T2 + T3 · Click to review</p></div>
</div>
<div class="export-bar"><button class="export-btn" onclick="exportReview()">Export Review</button></div>

<script src="data_all.js?v=3"></script>
<script>
var allCases = [];
BENCHMARK_T1.cases.forEach(function(c){ c._tier = 'T1'; allCases.push(c); });
BENCHMARK_T2.cases.forEach(function(c){ c._tier = 'T2'; allCases.push(c); });
BENCHMARK_T3.cases.forEach(function(c){ c._tier = 'T3'; allCases.push(c); });

var currentTab = 'T1';
var reviewState = JSON.parse(localStorage.getItem('finif_all_review') || '{}');

function getFilteredCases(){
  if(currentTab === 'ALL') return allCases;
  return allCases.filter(function(c){ return c._tier === currentTab; });
}

function saveReview(){ localStorage.setItem('finif_all_review', JSON.stringify(reviewState)); renderSidebar(); }
function setConstraintReview(cid,conId,status,comment){ if(!reviewState[cid]) reviewState[cid]={}; reviewState[cid][conId]={status:status,comment:comment||''}; saveReview(); }
function getConstraintReview(cid,conId){ return (reviewState[cid]||{})[conId]||null; }
function getCaseReviewSummary(cid){ var cr=reviewState[cid]||{}; var k=Object.keys(cr); return {total:k.length, passed:k.filter(function(x){return cr[x].status==='pass'}).length, commented:k.filter(function(x){return cr[x].status==='comment'}).length}; }
function escapeHtml(t){ var d=document.createElement('div'); d.textContent=t; return d.innerHTML; }

function switchTab(tab){
  currentTab = tab;
  document.querySelectorAll('.tab-btn').forEach(function(b){ b.classList.remove('active'); });
  document.querySelectorAll('.tab-btn').forEach(function(b){ if(b.textContent.indexOf(tab)>=0 || (tab==='ALL' && b.textContent.indexOf('All')>=0)) b.classList.add('active'); });
  renderSidebar();
  document.getElementById('main-content').innerHTML = '<div class="empty-state"><h2>Select a case</h2><p>Click a case to review</p></div>';
}

function renderSidebar(){
  var cases = getFilteredCases();
  var stats = document.getElementById('sidebar-stats');
  var totalR = 0; for(var k in reviewState) totalR += Object.keys(reviewState[k]).length;
  stats.innerHTML = cases.length + ' cases · ' + totalR + ' reviewed';
  var list = document.getElementById('case-list');
  list.innerHTML = '';
  var curType = '';
  cases.forEach(function(c, i){
    var groupKey = c._tier + ':' + c.task_type;
    if(groupKey !== curType){
      curType = groupKey;
      var d = document.createElement('div');
      d.className = 'group-header';
      d.textContent = c.task_type + ' ' + c.subtask_name;
      list.appendChild(d);
    }
    var rv = getCaseReviewSummary(c.case_id);
    var badge = '';
    if(rv.total > 0){ badge = rv.commented > 0 ? '<span class="review-status status-commented">' + rv.commented + ' comment</span>' : '<span class="review-status status-passed">' + rv.passed + '/' + c.constraint_count + '</span>'; }
    var item = document.createElement('div');
    item.className = 'case-item';
    item.dataset.caseId = c.case_id;
    item.innerHTML = '<div class="case-id">' + c.case_id + ' ' + badge + '</div><div class="case-meta"><span class="badge badge-' + c.difficulty + '">' + c.difficulty + '</span><span>' + c.constraint_count + ' con</span></div>';
    item.onclick = (function(cc){ return function(){ selectCase(cc); document.querySelectorAll('.case-item').forEach(function(el){el.classList.remove('active')}); this.classList.add('active'); }; })(c);
    list.appendChild(item);
  });
}

function selectCase(c){
  var main = document.getElementById('main-content');
  main.innerHTML = '';

  var hdr = document.createElement('div'); hdr.className = 'section';
  hdr.innerHTML = '<div class="case-header"><h1>' + c.case_id + '</h1><div class="meta-tags"><span class="badge badge-' + c.difficulty + '">' + c.difficulty + '</span><span class="meta-tag">' + c._tier + '</span><span class="meta-tag">' + c.subtask_name + '</span><span class="meta-tag">Source: ' + c.source + '</span><span class="meta-tag">' + c.constraint_count + ' constraints</span></div></div>';
  main.appendChild(hdr);

  var src = c.source;
  var ctxLabel = src.indexOf('fineval')>=0?'FinEval IE':src.indexOf('cfbench')>=0?'CFBench':src.indexOf('writingbench')>=0?'WritingBench FB':src.indexOf('synthetic')>=0?'Synthetic':'Other';
  var ctx = document.createElement('div'); ctx.className = 'section';
  ctx.innerHTML = '<h3 class="collapsible" onclick="this.classList.toggle(\'open\');this.nextElementSibling.classList.toggle(\'show\')">Context (' + ctxLabel + ')</h3><div class="collapsible-content"><div class="text-block">' + escapeHtml(c.context) + '</div></div>';
  main.appendChild(ctx);

  var qs = document.createElement('div'); qs.className = 'section';
  qs.innerHTML = '<h3>Query</h3><div class="text-block">' + escapeHtml(c.query) + '</div>';
  main.appendChild(qs);

  var cs = document.createElement('div'); cs.className = 'section';
  var t = '<h3>Constraints</h3><table><thead><tr><th style="width:40px">#</th><th style="width:50px">Type</th><th style="width:50px">Scope</th><th>Description</th><th style="width:160px">Review</th></tr></thead><tbody>';
  c.constraints.forEach(function(con, idx){
    var desc = typeof con==='string'?con:con.description;
    var ctype = con.type||'';
    var cscope = con.scope||'';
    var typeBadge = ctype==='hard'?'<span class="type-badge type-badge-hard">Hard</span>':'<span class="type-badge type-badge-soft">Soft</span>';
    var scopeBadge = cscope==='F'?'<span class="type-badge" style="background:#fce4ec;color:#c62828">F</span>':'<span class="type-badge" style="background:#e8eaf6;color:#283593">G</span>';
    var conKey = 'C' + (idx+1);
    var rv = getConstraintReview(c.case_id, conKey);
    var pa = rv&&rv.status==='pass'?' active':'';
    var ca = rv&&rv.status==='comment'?' active':'';
    var cshow = rv&&rv.status==='comment'?' show':'';
    var cv = (rv&&rv.comment)?rv.comment:'';
    t += '<tr><td><strong>' + (idx+1) + '</strong></td><td>' + typeBadge + '</td><td>' + scopeBadge + '</td><td>' + escapeHtml(desc) + '</td><td><div class="review-actions"><button class="btn-pass' + pa + '" onclick="handlePass(\'' + c.case_id + '\',\'' + conKey + '\',this)">Pass</button><button class="btn-comment' + ca + '" onclick="handleComment(\'' + c.case_id + '\',\'' + conKey + '\',this)">Comment</button></div><div class="comment-input' + cshow + '"><textarea placeholder="modification suggestion..." onblur="saveComment(\'' + c.case_id + '\',\'' + conKey + '\',this)">' + escapeHtml(cv) + '</textarea></div></td></tr>';
  });
  t += '</tbody></table>';
  cs.innerHTML = t;
  main.appendChild(cs);

  var fp = document.createElement('div'); fp.className = 'section';
  fp.innerHTML = '<h3 class="collapsible" onclick="this.classList.toggle(\'open\');this.nextElementSibling.classList.toggle(\'show\')">Full Prompt</h3><div class="collapsible-content"><div class="text-block">' + escapeHtml(c.prompt) + '</div></div>';
  main.appendChild(fp);
}

function handlePass(cid,conId,btn){ var td=btn.closest('td'); td.querySelector('.btn-comment').classList.remove('active'); btn.classList.add('active'); td.querySelector('.comment-input').classList.remove('show'); setConstraintReview(cid,conId,'pass',''); }
function handleComment(cid,conId,btn){ var td=btn.closest('td'); td.querySelector('.btn-pass').classList.remove('active'); btn.classList.add('active'); var ci=td.querySelector('.comment-input'); ci.classList.add('show'); ci.querySelector('textarea').focus(); setConstraintReview(cid,conId,'comment',ci.querySelector('textarea').value); }
function saveComment(cid,conId,ta){ var rv=getConstraintReview(cid,conId); if(rv&&rv.status==='comment') setConstraintReview(cid,conId,'comment',ta.value); }
function exportReview(){ var o={}; allCases.forEach(function(c){ var cr=reviewState[c.case_id]||{}; if(Object.keys(cr).length>0) o[c.case_id]=cr; }); var b=new Blob([JSON.stringify(o,null,2)],{type:'application/json'}); var u=URL.createObjectURL(b); var a=document.createElement('a'); a.href=u; a.download='benchmark_review_all.json'; a.click(); URL.revokeObjectURL(u); }

renderSidebar();
</script>
</body>
</html>
