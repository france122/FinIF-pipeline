5万亿元，占11.8%；企业信用债15.8万亿元，占10.7%；其他债券9.4万亿元，占6.4%。可以看出，政府类债券（国债、地方债、政策性金融债）合计占比超过七成，是市场的主体。\n\n### 2. 利率走势与信用利差变化\n\n上半年各期限债券的收益率普遍下降。以国债为例，1年期收益率从年初的1.58%降至1.42%，下降16个基点；10年期从2.35%降至2.18%，下降17个基点。10年期国开债（政策性金融债）下降16个基点。信用债的收益率下降幅度更大：3年期AAA级企业债从2.72%降至2.45%，下降27个基点；3年期AAA级城投债从2.85%降至2.52%，下降33个基点；1年期AAA级同业存单从1.78%降至1.65%，下降13个基点。\n\n信用债收益率下降幅度明显超过同期限利率债，导致信用利差显著收窄。3年期AAA级信用利差（相对于同期限国债）从年初的37个基点缩小至27个基点；3年期AA+级信用利差从68个基点缩小至52个基点；城投债利差从50个基点缩小至34个基点。这表明市场对信用风险的担忧有所减轻，愿意接受的信用溢价降低。\n\n### 3. 违约与信用风险状况\n\n上半年新增违约主体8家，涉及债券23只，违约规模186.5亿元。与去年同期相比，违约主体减少3家，违约规模下降22.3%。违约行业主要集中在房地产（3家），其次为制造业（2家），商贸、能源和综合各1家。房地产行业仍是违约高发领域，但整体违约数量和金额均有所下降，信用环境出现一定改善。\n\n信用利差的收窄与违约减少的趋势基本一致：当实际违约风险下降时，市场要求的风险补偿自然降低。不过，信用利差收窄也可能受到市场资金充裕、利率整体下行等因素的共同影响。\n\n## 二、下半年配置策略参考\n\n### 1. 久期管理视角\n\n上半年利率债收益率下降幅度在长短端之间相差不大（10年期降17个基点，1年期降16个基点），收益率曲线形态基本保持平稳。当前10年期国债收益率处于2.18%的历史较低水平，未来进一步下行的空间可能有限，但若经济复苏乏力，利率仍有走低的可能。对于机构投资者而言，在收益率低位时，拉长久期可能面临利率反弹带来的价格损失；而短久期则收益较低。建议根据自身负债期限和风险承受能力，权衡久期暴露的利弊。若预期经济基本面偏弱，可适度保持偏长久期；若担心通胀压力或政策收紧，则宜缩短久期。\n\n### 2. 信用下沉与利差机会\n\n上半年信用利差大幅收窄，目前3年期AAA级信用利差仅27个基点，AA+级为52个基点，均已处于历史较低水平。这意味着通过购买更低评级债券来获取更高收益的空间已经变小。同时，尽管违约数量减少，但房地产等行业的不确定性依然存在，尾部风险不可忽视。在利差较窄的情况下，进一步下沉到更低评级（如AA及以下）可能面临较高的信用风险，而得到的溢价补偿却很有限。建议关注利差变化趋势，若后续经济数据或政策调整导致利差重新走阔，可择机进行信用债配置；若利差持续低位，则应优先考虑高等级、流动性好的品种，避免过度追求票息而牺牲安全性。\n\n### 3. 综合参照\n\n总体来看，上半年债券市场呈现收益率下行、信用利差收窄、违约风险缓和的格局。下半年需密切关注宏观经济走势、货币政策动向以及房地产行业风险演变。在配置上，建议保持组合的灵活性，合理分配利率债与信用债的比例。对于风险偏好较低的机构，可以继续以利率债和高等级信用债为主；对于有一定风险承受能力的机构，可在利差走阔时适度参与中等评级信用债，但需控制集中度并做好个券筛选。以上内容仅为基于市场数据的客观分析，不构成具体投资建议，各机构应结合自身实际情况决策。", "pro_response": "## 2025年上半年银行间债券市场回顾\n\n### 市场规模与结构\n截至2025年6月末，银行间债券市场托管余额147.8万亿元，较年初增长约4.2%。从存量结构来看，国债占比约25.8%（38.2万亿），地方政府债占比约28.6%（42.3万亿），政策性金融债占比约16.6%（24.6万亿），三者合计超过总量的七成，利率债占据绝对主导地位。同业存单占比约11.8%（17.5万亿），企业信用类债券（不含存单）占比约10.7%（15.8万亿），其他债券占比约6.4%。上半年各类债券发行总额34.7万亿元，同比增长8.6%。其中信用债发行7.2万亿元、净融资0.8万亿元；地方政府债发行4.8万亿元，新增专项债达到3.2万亿元，财政融资节奏整体偏快。\n\n### 利率走势与信用分化\n上半年各品种债券的到期收益率普遍下行，信用债的表现明显强于利率债。1年期国债、10年期国债和10年期国开债收益率分别回落16、17和16个基点，下行幅度相对温和。而3年期AAA企业债和AAA城投债的收益率下降幅度达到27和33个基点，1年期AAA同业存单的收益率也下降了13个基点。信用债的突出表现带动信用利差快速压缩——3年期AAA品种与同期限国债的利差从年初的37个基点收窄至27个基点，AA+品种利差和城投债利差均收窄了16个基点。这反映出市场对信用债的配置意愿强烈，同时对风险溢价的索取有所降低。\n\n### 信用风险与利差收窄的逻辑\n2025年上半年，银行间市场新增违约主体8家，涉及债券23只，违约规模约186.5亿元，同比减少3家、规模下降22.3%。违约主体集中在房地产（3家）、制造业（2家）以及商贸、能源和综合类行业。违约数量的下降与信用利差的收窄在方向上一致，但两者的驱动力并不完全相同。利差压缩更多受到整体流动性充裕、可配置的优质资产相对稀缺的影响，机构在信用债领域持续加大投入，推低了收益率和利差。不过，违约风险仍有明显的行业特征，房地产等领域的偿债压力并未完全消退，信用状况呈现总量改善、结构分化的格局。\n\n## 下半年配置思路参考\n\n### 投资期限的权衡\n从上半年的走势看，利率债长短端收益率降幅相近，10年期与1年期国债的利差基本未变，仅收窄了约1个基点。当前10年期国债收益率处于2.18%附近，较年初已有一定幅度的下行，若要进一步走低，可能需要更多基本面或政策信号的配合。在收益率平稳或小幅波动的环境下，拉长债券组合的投资期限（即增加对长期限债券的配置）会放大组合价格对利率变动的敏感度，这既可能带来更高的价格弹性，也意味着净值波动会相应放大。如果预期未来利率仍有温和下行空间，适当向中等期限品种倾斜，可在风险与弹性之间寻求平衡。\n\n### 信用品种的筛选与风险考量\n上半年信用债收益率下行更快，使得信用利差已降至近年来的偏低水平，3年期AAA品种与国债的利差仅为27个基点。中等评级（如AA+）品种的绝对利差尚有52个基点，仍能提供一定的票息优势，但相较于年初也已明显收窄。在利差被大幅压缩后，单纯依靠评级下沉来增厚收益的空间在收窄，且尾部风险不容忽视。违约数据反映出行业间的信用差异依然显著，房地产等领域的个券仍需仔细甄别。机构若适度放宽对信用评级的要求以争取额外票息，可能需要更加聚焦发行主体的现金流稳定性和再融资能力，优先选择经营韧性较强、所处行业景气度相对确定的发行人，从而在微薄的信用溢价中控制好尾部风险。", "flash_score": {"score": 0.6, "hard": {"passed": 2, "total": 2}, "soft": {"passed": 1, "total": 3}}, "pro_score": {"score": 1.0, "hard": {"passed": 2, "total": 2}, "soft": {"passed": 3, "total": 3}}, "constraints": [{"id": "C10", "key": "T3.2-011#C10", "type": "soft", "tag": "S1", "description": "语气客观中立，不包含主观投资建议", "flash_pass": false, "flash_reason": "parsed from malformed json", "pro_pass": true, "pro_reason": "输出整体语气客观中立，仅进行了市场分析和配置思路的客观论述，未出现'建议买入/卖出'等主观投资建议。"}, {"id": "C11", "key": "T3.2-011#C11", "type": "hard", "tag": "F1", "description": "2个二级标题", "flash_pass": true, "flash_reason": "", "pro_pass": true, "pro_reason": ""}, {"id": "C12", "key": "T3.2-011#C12", "type": "soft", "tag": "S2", "description": "以机构投资者为目标读者撰写", "flash_pass": true, "flash_reason": "输出明确面向机构投资者，包含专业金融术语、详细数据和分析策略，符合专业水平要求。", "pro_pass": true, "pro_reason": "输出使用了大量专业金融术语，包含详细的市场数据和分析深度，明确面向机构投资者。"}, {"id": "C13", "key": "T3.2-011#C13", "type": "hard", "tag": "F1", "description": "至少两层标题层级", "flash_pass": true, "fl .7亿元（占营收12.7%），较2024年的12.3亿元下降29.3%。\n非集采品种收入59.8亿元（同比+18.6%）。", "flash_response": "**德润制药2025年业绩显示，公司正加速从集采依赖转向创新驱动，非集采业务与高研发投入为中长期增长提供支撑，但集采缩量与管线商业化不确定性构成核心风险。**\n\n德润制药2025年营收68.5亿元，同比增长9.95%，归母净利润8.2亿元，同比增长9.33%。收入增长主要由非集采业务拉动，而集采业务持续萎缩。从结构看，非集采收入59.8亿元，占比87.3%，同比增长18.6%，增速显著高于整体；集采收入8.7亿元，占比12.7%，同比大幅下降29.3%。集采品种中标价降幅达52%-68%，虽短期内压缩利润空间，但非集采业务的强势（占营收近九成）有效对冲了此冲击，公司整体毛利率稳定性有待年报进一步披露。\n\n研发费用率达11.39%（7.8亿元/68.5亿元），较行业平均水平（约8%）高出3.39个百分点，且研发费用增速（+20%）显著快于营收增速，反映出公司主动加码创新。高研发投入转化为管线储备：截至2025年末，在研项目32个，其中4个处于III期临床，预计2026年有2个品种申报上市。此外，2025年获批2个仿制药、通过5个品种一致性评价，短期可贡献确定性增量。基于此，结合集采品种收入基数逐年降低（2025年集采收入较2024年下降3.6亿元）及非集采业务假设维持15%左右增速，测算2026-2027年收入增长中枢约在8%-12%区间。\n\n从风险管理角度，以下要点需重点关注：\n\n1. **集采持续扩面风险**：第十批集采已造成公司集采收入下降29.3%，若后续品种被纳入新批次集采，非集采收入占比可能被动压缩，影响整体收入增速。\n2. **研发管线失败风险**：32个在研项目中，III期临床仅4个，临床前项目占比50%，研发成功率存在不确定性；2026年拟申报上市的2个品种若审批延迟或疗效/成本不达预期，将推迟收入兑现。\n3. **仿制药竞争加剧风险**：公司2025年获批新药均为仿制药，同类产品市场竞争激烈，可能导致价格或市场份额低于预期，拖累非集采业务增速。\n4. **现金流与资本开支匹配风险**：研发费用率已超11%，若未来收入增速放缓，高研发投入可能挤压现金流；2025年经营现金流12.3亿元尚可覆盖研发支出，但需关注后续资本开支计划。\n\n综合公司业务结构、研发强度与管线进展，采用基于2026年预测净利润（约9.0亿元，同比增长10%）的相对估值法，参考A股化学制药板块可比公司（如华海药业、信立泰等）当前PE估值中枢在20-25倍区间，给予德润制药2026年目标市盈率20-25倍，对应目标市值区间为180亿至225亿元。该区间已隐含集采持续下行及新药贡献延后的风险折价。\n\n**风险提示声明**：本报告基于公开披露的财务数据及研发信息进行分析，不构成任何投资建议。医药行业受政策调整、市场竞争、研发失败及宏观经济等多重因素影响，实际业绩可能与预测存在较大偏差。投资者应独立判断，审慎决策。", "pro_response": "**德润制药2025年集采品种收入收缩但非集采高增支撑整体增长，高研发投入强化管线储备，预计2026-2027年营收增速中枢约为8%-12%，基于风险调整后的合理目标估值区间对应12-18倍市盈率。**\n\n2025年公司实现营业收入68.5亿元（同比+9.95%），归母净利润8.2亿元（同比+9.33%），经营现金流12.3亿元，盈利质量良好。其中，集采品种收入8.7亿元（同比-29.3%），占总营收12.7%，较2024年19.7%的占比显著下降；非集采品种收入59.8亿元（同比+18.6%），占比升至87.3%。收入结构的此消彼长表明公司正在逐步降低对集采依赖，但集采品种价格降幅达52%-68%的冲击尚未完全出清，非集采品种后续面临的市场竞争及潜在集采扩面仍是关键变量。\n\n从风险管理角度审视，当前公司面临以下需重点关注的因素：\n1. 集采存续及扩面风险：第十批集采3个品种中标价格降幅巨大，2025年相关收入已下降近三成，若后续批次继续纳入核心品种，营收和利润可能进一步承压。\n2. 非集采增长的可持续性风险：非集采收入18.6%的高增速部分源于渠道拓展和新产品短期放量，在仿制药同质化竞争和医保控费背景下，维持双位数高增长的难度逐年加大。\n3. 研发回报周期与失败风险：在研项目32个，2025年获批新药均为仿制药，III期至上市仍有审评失败或进度延迟可能，且仿制药上市后往往迅速面临集采定价，研发投入转化为稳定收益的周期较长。\n4. 研发费用高企对利润的侵蚀风险：研发费用率达11.4%（7.8 元，扣除各项费用及所得税后，对净利润的影响可能达到3.00-3.50亿元。若剔除该项一次性确认，前三季度业绩增速将大幅收敛，盈利中枢明显下移。\n\n此外，非经常性损益结构也表明了收益的不对称性。预告显示：\n\n> 预计1-9月非经常性损益0.7亿元，主要为：政府补助0.5亿元，处置长期股权投资收益0.3亿元，资产减值损失-0.1亿元。\n\n其中资产减值损失尽管仅-0.10亿元，但结合“应收账款余额增长较快”的风险提示，需关注未来是否因海外回款周期拉长而被迫计提更高减值。政府补助与股权处置收益均不具备可复制性，在预测内生增长时应予剔除。\n\n储能电池出货量同比增长85%，是收入增长的基本盘，这也得益于碳酸锂价格同比下降约25%的成本端助力。然而，动力电池行业历史上多次出现“原料降价→扩产→供给过剩→价格战”的循环，当前成本红利能延续多久，需打上问号。\n\n## 三、风险审视与全年展望\n\n预告中列出的风险均非泛泛而谈，每项均可能对后续季度构成实质扰动。首当其冲的是原材料价格与贸易政策：\n\n> 碳酸锂价格近期出现反弹趋势；北美项目受关税政策影响存在不确定性。\n\n碳酸锂类似新能源产业的“工业食盐”，价格反弹会直接侵蚀储能电池的毛利率。尤其海外项目通常为锁价长单，若在交付周期内上游原料涨价，企业将面临“售价被锁定、成本在浮动”的夹心困境。北美关税政策则像达摩克利斯之剑，即便已有在手订单，一旦关税税率大幅调升，项目盈利能力会迅速缩水，甚至出现增收不增利的被动局面。\n\n应收账款增长较快是另一重隐忧。海外公用事业客户虽信用等级较高，但项目结算周期往往较长，叠加潜在的贸易摩擦，回款进度若低于预期，就有可能从资产减值损失和现金流两个层面冲击报表健康度。\n\n关于全年业绩预测，我们基于已披露信息做谨慎推演。截至2025年9月30日：\n\n> 在手订单金额86.5亿元（含税）。其中海外订单52.3亿元，占比60.5%。\n\n86.50亿元在手订单含税，折算为不含税收入约76.55亿元（按13%增值税率估算）。前三季度确认收入中已包含12.30亿元北美大项目，再考虑常规交付，预计前三季度总收入已达相当规模。剩余在手订单需在Q4及以后陆续交付，其中海外订单52.30亿元，假设Q4能转化约25%-30%为收入，对应约14.00-17.00亿元不含税收入，按38.20%毛利率和一定费用率，再叠加国内业务稳定贡献，我们预估**2025年全年归母净利润区间为10.50亿元至12.00亿元**。该区间隐含Q4单季归母净利润约1.50-2.50亿元，较Q3明显回落，主要反映北美大项目不可持续及潜在成本上行、减值风险。若碳酸锂价格反弹超预期或北美关税政策恶化，实际利润可能贴近下沿甚至不达下沿；若海外交付超预期且成本控制得力，方有望触及上沿。\n\n综合而言，青山新能源三季报业绩预告展现了强劲的短期爆发力，但增长根基中存有显著的一次性大单因素。投资者不宜简单线性外推，而应等待四季度交付节奏、原材料价格走势及贸易政策更明朗的窗口，再对中长期价值做出判断。", "flash_score": {"score": 0.6666666666666666, "hard": {"passed": 1, "total": 3}, "soft": {"passed": 3, "total": 3}}, "pro_score": {"score": 0.6666666666666666, "hard": {"passed": 2, "total": 3}, "soft": {"passed": 2, "total": 3}}, "constraints": [{"id": "C10", "key": "T2.1-010#C10", "type": "soft", "tag": "L3", "description": "专业术语英文缩写需给出中文全称", "flash_pass": true, "flash_reason": "模型输出中未出现任何金融专业术语英文缩写（如ROE、PE、EBITDA等），因此无需提供中文全称解释，符合约束要求。", "pro_pass": null, "pro_reason": ""}, {"id": "C11", "key": "T2.1-010#C11", "type": "hard", "tag": "F5", "description": "至少3处引用块", "flash_pass": true, "flash_reason": "", "pro_pass": true, "pro_reason": ""}, {"id": "C12", "key": "T2.1-010#C12", "type": "hard", "  - 348,690}{432,180} = \\frac{83,490}{432,180} \\approx 19.32\\% \\)  \n- **同比变动**：下降 **1.44个百分点**（19.32% → 17.88%）。  \n- **推导**：成本增速（+14.27%）高于收入增速（+12.27%），导致每百元收入中成本占比上升，毛利率被动压缩。\n\n#### 2. 净利率\n- **2025H1**：\\( \\frac{6,450}{485,230} \\approx 1.33\\% \\)  \n- **2024H1**：\\( \\frac{16,957}{432,180} \\approx 3.92\\% \\)  \n- **同比变动**：下降 **2.59个百分点**（3.92% → 1.33%）。  \n- **推导**：净利润降幅（-61.97%）远大于收入增幅（+12.27%），净利率被费用与减值损失大幅拖累。正如 *“净利润 6,450 … -61.97%”* 所示，盈利中枢出现断崖式下移。\n\n---\n\n### 三、三大费用率横向对比与费用管控有效性分析\n\n| 费用率指标 | 2025H1 | 2024H1 | 同比变动（百分点） |\n|------------|--------|--------|-------------------|\n| 销售费用率 | 3.23%  | 3.06%  | +0.17             |\n| 管理费用率 | 5.84%  | 5.94%  | -0.10             |\n| 财务费用率 | 2.57%  | 2.28%  | +0.29             |\n\n- **管理费用率**同比下降0.10个百分点，表明公司在后台职能管控上取得一定成效，费用增速（+10.40%）低于收入增速（+12.27%），相对效率有所提升。  \n- **销售费用率**同比上升0.17个百分点，说明销售投入扩张速度（+18.35%）超过收入增长，边际效益递减，需警惕投入产出比恶化。  \n- **财务费用率**同比上升0.29个百分点，升幅最大，主要受利率上升或债务规模扩大影响，反映出资本结构对利润的侵蚀加剧。  \n- **横向对比**：三项费用率合计由11.28%升至11.64%，整体费用管控能力不足，尤其是财务费用和销售费用需优先优化。\n\n> 引用原文：*“财务费用 12,450 … +26.14%”* 远超收入增速，是费用率上升的最大推手。\n\n---\n\n### 四、经营改善优先级建议\n\n基于上述分析，建议按以下优先级推进改善措施：\n\n1. **第一优先级：控制信用与资产减值损失**。两项合计增加4,160万元，占利润下降额的近30%。应立即强化客户信用评级、缩短应收账款账期，并对存量资产进行减值测试与处置，减少坏账和跌价冲击。  \n2. **第二优先级：优化财务结构，降低财务费用**。通过债务置换、利率谈判或股权融资降低利息支出，同时控制新增借款规模，避免财务杠杆过度放大。  \n3. **第三优先级：提升销售费用效率**。重新评估营销活动的ROI，削减低效渠道投放，将资源聚焦于高回报客户或区域，并推动销售流程数字化以降低获客成本。  \n4. **第四优先级：稳定毛利率**。通过集中采购、供应链优化或服务提价来压缩成本增速（当前成本增速高于收入增速），同时关注公允价值变动风险，调整投资组合以降低波动。  \n\n综上所述，宏远物流2025年上半年盈利能力的急剧下滑主要源于费用失控与减值激增，而非收入萎缩。管理层应果断采取以减支、降息、控风险为核心的短期行动，并同步推进长期成本结构优化，方能在下半年实现经营企稳。", "pro_response": "> 宏远物流2025年半年度利润表分析备忘录\n> **致：** 管理层及董事会\n> **发件人：** 财务分析部\n> **日期：** 2025年7月31日\n> **事由：** 关于2025年半年度利润大幅下滑的驱动因素拆解及经营改善建议\n\n本备忘录基于宏远物流集团2025年半年度财务数据，旨在深度剖析利润大幅下滑的核心症结，并对盈利能力变化及费用管控效能进行量化评判。\n\n### 一、 利润下滑驱动因素按影响金额降序排列\n\n2025年上半年，集团归母净利润由14,520万元断崖式下跌至5,230万元，降幅高达63.98%。通过对合并利润表的结构化拆解，将导致营业利润（核心利润）减少的因素按绝对影响额降序排列如下：\n\n1.  **营业成本大幅攀升（首要侵蚀因素）：**\n    成本增速显著高于收入增速，是吞噬利润的最大黑洞。具体体现在：\n    > 营业收入：+12.27%，而营业成本：+14.27%。\n    成本增幅跑赢收入增幅2个百分点，直接导致毛利增量受限。鉴于集团营收基数庞大（485,230万元），成本上涨2个百分点的绝对影响金额高达约7,976万元，是所有负面因素中金额最大的一项。\n\n2.  **拨备计提激增（信用与资产减值）：**\n    风险敞口扩大导致拨备计提成倍增加，构成第二大侵蚀项。\n    > 资产减值损失：-3,200万元，同比变动 +120.69%；信用减值损失：-5,680万元，同比变动 +73.70%。\n    两项减值损失合计同比增加4,160万元，这通常反映出应收账款回收困难加剧或资产存在贬值风险，对利润的侵蚀最为剧烈且具备突发性。\n\n3.  **期间费用全面承压（销售、管理、研发、财务）：**\n    期间费用合计同比增加9,750万元，其中销售费用增速最快。\n    > 销售费用：同比+18.35%；财务费用：同比+26.14%。\n    费用端的刚性增长叠加收入放缓，进一步压低了利润空间。\n\n4.  **非经营性收益逆转（公允价值变动）：**\n    资本市场的波动导致了非经常性损益的严重拖累。\n    > 公允价值变动：-1,850万元，同比变动 -337.18%。\n    从去年同期的盈利780万元转为亏损，不仅未能贡献利润，反而造成同比利润减少2,630万元。\n\n### 二、 盈利能力指标推导与分析\n\n1.  **毛利率变动推导**\n    毛利率反映基础物流业务的盈利护城河。\n    *   **2025H1 毛利率计算：**\n        毛利 = 营业收入 485,230 - 营业成本 398,450 = 86,780万元\n        毛利率 = (86,780 / 485,230) * 100% ≈ **17.88%**\n    *   **2024H1 毛利率计算：**\n        毛利 = 432,180 - 348,690 = 83,490万元\n        毛利率 = (83,490 / 432,180) * 100% ≈ **19.32%**\n    *   **同比变动：**\n        毛利率下滑 1.44 个百分点（19.32% → 17.88%）。这表明在行业价格战或成本上涨背景下，集团的基础业务盈利厚度被明显削薄。\n\n2.  **净利率变动推导**\n    净利率反映公司在扣除所有成本、税费及非经常性损益后的终极盈利能力。\n    *   **2025H1 净利率计算：**\n        净利率 = (净利润 6,450 / 营业收入 485,230) * 100% ≈ **1.33%**\n    *   **2024H1 净利率计算：**\n        净利率 = (16,957 / 432,180) * 100% ≈ **3.92%**\n    *   **同比变动：**\n        净利率急剧下滑 2.59 个百分点（3.92% → 1.33%）。降幅远大于毛利率降幅，不仅印证了成本失控，更直接说明了刚性费用和巨额减值计提对最终利润的毁灭性打击。目前1.33%的净利率水平极低，意味着公司抗风险能力非常脆弱。\n\n### 三、 三大费用率横向对比与管控有效性评估\n\n我们将销售、管理、财务三大费用进行费率分析（费用占营业收入比重），以剔除规模效应的干扰：\n\n| 费用类型 | 2025H1费率 | 2024H1费率 | 费率同比变动 | 管控评价 |\n| :--- | :--- | :--- | :--- | :--- |\n| **销售费用率** | 3.23% | 3.06% | **+0.17 pct** | **失控预警** |\n| **管理费用率** | 5.84% | 5.94% | **-0.10 pct** | **稳健可控** |\n| **财务费用率** | 2.57% | 2.28% | **+0.29 pct** | **承压显著** |\n\n**分析评语：**\n*   **销售费用管控失效：** 销售费用增速（18.35%）显著快于营收增速（12.27%），导致费率攀升。这说明集团目前的获客成本在急遽上升，或者价格战中的营销返利、渠道佣金投入产出比正在恶化。\n*   **管理费用相对优化：** 管理费用增速（10.40%）略低于营收增速，起到了微弱的杠杆效应。在业务扩张期能做到管理费率同比压降，体现了后台职能部门人员精简或数字化提效的成果。\n*   **财务费用成为重压：** 财务费用率上升0.29个百分点，增幅较大。结合当 评级“增持”。**\n\n1. **成长性评估（评分：5/5）**  \n   2025年上半年营业收入同比增长24.01%，归母净利润增速达41.05%，经营性现金流净额更大幅增长52.14%，显示盈利质量优良。核心驱动来自汽车芯片业务38.5%的高增速，车规级MCU市场份额由6.8%跃升至9.2%，在国内供应链自主化趋势下具备持续扩张潜力。该类高壁垒产品放量既贡献规模又提供结构性溢价，成长确定性较强。  \n   *收益与风险平衡：若汽车芯片持续渗透，未来收入有望保持30%以上增长；但汽车客户验证周期长，一旦下游车型切换或需求波动，收入波动将被放大。*\n\n2. **盈利能力与关键费用率推导（评分：4/5）**  \n   综合毛利率与研发费用率推导过程如下：  \n   综合毛利率 = Σ(各业务收入×毛利率)/总收入  \n   = (19.13×42.3% + 11.96×36.8% + 9.56×28.5% + 7.17×45.1%) / 47.82  \n   = (8.094 + 4.401 + 2.725 + 3.234) / 47.82  \n   = 18.454 / 47.82 ≈ 38.59%  \n   研发费用率 = 9.56 / 47.82 ≈ 20.0%  \n   2025H1整体毛利率38.6%，归母净利率约17.5%，加权平均ROE 14.2%，在半导体设计公司中处于良好水平。但消费电子芯片毛利率同比下降2.3个百分点至28.5%，拖累综合毛利表现。高研发投入（20%）短期压制利润，却是维持技术领先的必要成本。  \n   *收益与风险平衡：高毛利率的汽车与模拟芯片占比提升有助于稳定盈利中枢，但消费电子持续疲软可能进一步挤压该板块利润，需关注产品组合变化。*\n\n3. **研发实力与技术壁垒（评分：5/5）**  \n   研发团队1,856人，占员工总数62%；研发费用同比增加32.23%至9.56亿元，资本化程度低，当期费用化反映审慎会计处理。已获授权专利1,247项，其中发明专利892项，28nm车规工艺平台良率达98.2%，构筑扎实的制造壁垒。市场份额升至国内第二，印证研发投入向市场地位的转化效率。  \n   *收益与风险平衡：先进工艺和专利布局有助于锁定未来3-5年的产品迭代红利；但半导体技术路线更新快，若下一代工艺研发受阻，现有优势可能被削弱。*\n\n4. **风险维度审视（评分：3/5）**  \n   主要风险点：a) 消费电子芯片需求不振且毛利率持续下行，影响整体盈利稳定性；b) 汽车芯片前五大客户收入占比高达67%，单一客户或车型订单波动可能造成显著业绩扰动；c) 28nm产能扩张需资本开支约18亿元，可能推高折旧并压低短期净利润率；d) 中美贸易摩擦导致部分EDA工具供应存在不确定性，若受限将制约先进设计能力。上述因素构成中等风险水平，需持续跟踪。  \n   *收益与风险平衡：产能扩张若顺利达产可承接更多车规订单，形成规模效应；但建设期若遇需求放缓或融资环境收紧，将面临产能闲置与财务费用上升的双重压力。*\n\n5. **业务结构优化趋势：汽车芯片与消费电子对比**  \n   汽车芯片收入19.13亿元（+38.5%），占比40%，毛利率42.3%；消费电子芯片收入9.56亿元（+12.1%），占比20%，毛利率28.5%。两者增速差超26个百分点，毛利率差约13.8个百分点。汽车芯片已超越消费电子成为第一大板块，工业控制和模拟芯片亦有稳健贡献。该变化显示出公司正从周期波动较大的消费电子向高壁垒、长周期的汽车及工业市场倾斜，营收结构抗风险能力增强，综合毛利率中枢有望温和上移。  \n   *收益与风险平衡：结构优化带来估值体系切换预期，但对汽车客户深度绑定可能放大特定行业周期风险。*\n\n6. **6-12个月投资评级：增持**  \n   基于成长性高（5分）、盈利良（4分）、研发强（5分）且风险中等（3分）的综合评价，在当前时点给予“增持”评级。公司汽车芯片市占率提升与产品组合改善构成核心驱动力，但需密切关注产能扩张资金消耗、客户集中度变化及地缘政治对EDA工具的影响。适合对半导体国产替代逻辑有认知且能承受中期波动的零售投资者，配置时建议分批布局并设置适当止损。任何基于上述评级的决策均应视为独立判断，过往业绩不代表未来表现。", "flash_score": {"score": 0.8333333333333334, "hard": {"passed": 3, "total": 3}, "soft": {"passed": 2, "total": 3}}, "pro_score": {"score": 0.8333333333333334, "ha 15% | +25.3% |\n| 4 | 比亚迪 | 新能源 | 9.7 | 8.53% | +22.1% |\n| 5 | 招商银行 | 金融 | 8.2 | 7.21% | +5.8% |\n| 6 | 药明康德 | 医药 | 7.5 | 6.60% | -8.7% |\n| 7 | 海光信息 | 半导体 | 6.8 | 5.98% | +31.2% |\n| 8 | 美的集团 | 家电 | 5.9 | 5.19% | +11.4% |\n| 9 | 中国中免 | 消费 | 5.3 | 4.66% | -12.5% |\n| 10 | 三一重工 | 工程机械 | 4.6 | 4.05% | +8.9% |\n\n三、固收持仓\n| 品种 | 规模（亿元） | 占固收仓位比 | 久期（年） |\n|------|------------|-------------|----------|\n| 国债 | 12.5 | 43.6% | 5.2 |\n| 政金债 | 8.7 | 30.3% | 3.8 |\n| 信用债（AAA） | 5.2 | 18.1% | 2.1 |\n| 可转债 | 2.3 | 8.0% | 1.5 |\n\n四、业绩归因\nQ2组合收益率 +8.56%，其中权益贡献 +7.82%，固收贡献 +0.74%。\n基准收益率（沪深300×65%+中债综合×35%）为 +5.23%。\n\n---\n任务：\n请基于以上季度报告数据，完成以下高阶推导分析：1. 按行业分类汇总权益持仓，包含行业、持仓市值合计、占权益仓位合计比、加权平均涨跌幅；2. 计算Q2末权益持仓总市值和固收持仓总市值，验证与组合总规模×仓位比例是否一致，展示推导过程；3. 推算前十大持仓集中度（前十大市值合计占权益总市值比例），并据此评估集中度风险；4. 计算超额收益（组合收益率-基准收益率）并分析alpha来源。\n\n请在回答时严格遵守以下附加要求：\n（1）至少包含5个独立章节（用标题分隔）\n（2）使用正式书面语，不得口语化\n（3）使用2个二级标题（##）组织内容\n（4）开头第一个词必须是\"总结\"\n（5）回答末尾必须包含一段总结\n（6）回答分为5到8个段落", "context": "鹏程基金管理有限公司 2025年二季度资产配置季报\n\n一、宏观判断与组合概览\n| 指标 | 2025Q2末 | 2025Q1末 | 变动 |\n|------|---------|---------|------|\n| 组合总规模（亿元） | 156.8 | 142.3 | +10.19% |\n| 权益仓位 | 72.5% | 65.0% | +7.5pct |\n| 固收仓位 | 18.3% | 25.8% | -7.5pct |\n| 现金及其他 | 9.2% | 9.2% | 0pct |\n\n二、权益持仓明细（前十大）\n| 序号 | 股票名称 | 行业 | 持仓市值（亿元） | 占权益仓位比 | Q2涨跌幅 |\n|------|---------|------|----------------|-------------|---------|\n| 1 | 宁德时代 | 新能源 | 15.8 | 13.90% | +18.5% |\n| 2 | 贵州茅台 | 消费 | 12.6 | 11.08% | -3.2% |\n| 3 | 中芯国际 | 半导体 | 10.4 | 9.15% | +25.3% |\n| 4 | 比亚迪 | 新能源 | 9.7 | 8.53% | +22.1% |\n| 5 | 招商银行 | 金融 | 8.2 | 7.21% | +5.8% |\n| 6 | 药明康德 | 医药 | 7.5 | 6.60% | -8.7% |\n| 7 | 海光信息 | 半导体 | 6.8 | 5.98% | +31.2% |\n| 8 | 美的集团 | 家电 | 5.9 | 5.19% | +11.4% |\n| 9 | 中国中免 | 消费 | 5.3 | 4.66% | -12.5% |\n| 10 | 三一重工 | 工程机械 | 4.6 | 4.05% | +8.9% |\n\n三、固收持仓\n| 品种 | 规模（亿元） | 占固收仓位比 | 久期（年） |\n|------|------------|-------------|----------|\n| 国债 | 12.5 | 43.6% | 5.2 |\n| 政金债 | 8.7 | 30.3% | 3.8 |\n| 信用债（AAA） | 5.2 | 18.1% | 2.1 |\n| 可转债 | 2.3 | 8.0% | 1.5 |\n\n四、业绩归因\nQ2组合收益率 +8.56%，其中权益贡献 +7.82%，固收贡献 +0.74%。\n基准收益率（沪深300×65%+中债综合×35%）为 +5.23%。", "flash_response": "总结本报告基于鹏程基金管理有限公司2025年二季度资产配置季报数据，对权益持仓的行业分布、市值验证、集中度风险及超额收益来源进行系统分析。以下内容按两个二级标题展开推导。\n\n## 权益持仓分析与市值验证\n\n### 1. 按行业分类汇总权益持仓\n根据前十大持仓明细，按行业归类计算各行业市值合计、占权益总市值比例及加权平均涨跌幅。权益总市值由组合总规模156.8亿元与权益仓位72.5%求得为113.68亿元。各行业汇总如下：\n- **新能源**：宁德时代（15.8亿元，+18.5%）与比亚迪（9.7亿元，+22.1%）合计市值25.5亿元，占权益仓位22.43%，加权平均涨跌幅=(15.8×18.5%+9.7×22.1%)/25.5≈19.87%。\n- **消费**：贵州茅台（12.6亿元，-3.2%）与中国中免（5.3亿元，-12.5%）合计17.9亿元，占15.74%，加权涨跌幅=(12.6×(-3.2%)+5.3×(-12.5%))/17.9≈-5.95%。\n- **半导体**：中芯国际（10.4亿元，+25.3%）与海光信息（6.8亿元，+31.2%）合计17.2亿元，占15.13%，加权涨跌幅=(10.4×25.3%+6.8×31.2%)/17.2≈27.63%。\n- **金融**：招商银行8.2亿元，占7.21%，涨跌幅+5.8%。\n- **医药**：药明康德7.5亿元，占6.60%，涨跌幅-8.7%。\n- **家电**：美的集团5.9亿元，占5.19%，涨跌幅+11.4%。\n- **工程机械**：三一重工4.6亿元，占4.05%，涨跌幅+8.9%。\n前十大合计市值86.8亿元，占权益仓位76.35%，其余未列示股票占23.65%。\n\n### 2. 市值验证与推导过程\n组合总规模156.8亿元，权益仓位72.5%，则权益持仓总市值=156.8×0.725=113.68亿元；固收仓位18.3%，则固收持仓总市值=156.8×0.183≈28.69亿元。固收明细中，国债12.5亿元、政金债8.7亿元、信用债5.2亿元、可转债2.3亿元，合计28.7亿元，与28.69亿元基本吻合（差异源于四舍五入）。现金及其他仓位9.2%，对应14.43亿元，三项之和113.68+28.69+14.43=156.8亿元，与组合总规模完全一致。权益持仓前十大合计86.8亿元，剩余权益市值=113.68-86.8=26.88亿元，属未列示部分。\n\n## 集中度与超额收益分析\n\n### 3. 前十大持仓集中度及风险评估\n前十大持仓市值合计86.8亿元，占权益总市值113.68亿元的比例为76.36%。该集中度处于较高水平，具体表现为：单一行业方面，新能源与半导体合计占比37.56%，其中半导体行业加权涨幅高达27.63%，对组合收益贡献显著，但若该行业出现回调，将直接拖累组合净值；个股方面，宁德时代（13.90%）、贵州茅台（11.08%）、中芯国际（9.15%）、比亚迪（8.53%）前四大个股合计占比42.66%，存在单一个股风险暴露过大的问题。此外，消费与医药行业合计占比22.34%，且均录得负收益，进一步加剧组合波动。总体而言，当前集中度风险较高，需关注行业及个股的尾部风险。\n\n### 4. 超额收益计算与alpha来源分析\n组合Q2收益率为+8.56%，基准收益率为+5.23%（沪深300×65%+中债综合×35%），超额收益=8.56%-5.23%=+3.33%。alpha来源可从以下两方面解析：第一，资产配置层面，组合权益仓位为72.5%，显著高于基准的65%，超配权益在权益市场上涨周期中贡献了正超额；第二，选股层面，前十大持仓中半导体（中芯国际+25.3%、海光信息+31.2%）和新能源（宁德时代+18.5%、比亚迪+22.1%）等科技成长板块涨幅远超沪深300同期表现，而消费（贵州茅台-3.2%、中国中免-12.5%）与医药（药明康德-8.7%）虽拖累收益，但权重相对较低。固收部分久期适中，贡献0.74%的正收益，略高于基准固收部分。综合来看，超额收益主要源于对高景气赛道的超配及个股的Alpha捕捉，但需警惕集中度风险带来的潜在回撤。\n\n总结上述分析，本季度组合通过提升权益仓位并重仓半导体与新能源板块，实现了显著的超额收益，但前十大持仓集中度高达76.36%，且单一行业占比超过37%，存在较高集中度风险。建议后续适度分散行业配置，降低个股权重，以平衡收益与波动。", "pro_response": "总结：鹏程基金管理有限公司2025年二季度资产配置季报显示，组合总规模环比增长10.19%至156.8亿元，通过主动提升权益仓位7.5个百分点至72.5%，实现组合收益率8.56%，较基准超额收益达3.33%。本报告将从行业汇总、仓位验证、集中度评估及超额收益归因四个维度展开高阶分析，以全面审视组合的风险收益特征与运作效率。\n\n## 一、权益持仓行业分类汇总\n基于前十大重仓股的行业属性，对权益持仓进行行业维度汇总。鉴于前十大以外持仓无明细数据，以下汇总仅涵盖已披露部分，但已涉及权益总市值的76.35%。各行业持仓市值、占比及加权平均涨跌幅（以持仓市值加权计算Q2涨跌幅）详列如下：新能源行业含宁德时代与比亚迪，合计市值25.5亿元，占权益总市值22.43%，加权平均涨跌幅+19.87%；消费行业含贵州茅台与中国中免，合计市值17.9亿元，占比15.74%，涨跌幅-5.95%；半导体行业含中芯国际与海光信息，合计市值17.2亿元，占比15.13%，涨跌幅+27.63%；金融行业（招商银行）市值8.2亿元，占比7.21%，涨跌幅+5.80%；医药行业（药明康德）市值7.5亿元，占比6.60%，涨跌幅-8.70%；家电行业（美的集团）市值5.9亿元，占比5.19%，涨跌幅+11.40%；工程机械行业（三一重工）市值4.6亿元，占比4.05%，涨跌幅+8.90%；其余未分类持仓市值约26.88亿元，占比23.65%。新能源与半导体两大成长行业合计占比超37%，构成组合收益的动力核心，而消费与医药板块则形成拖累。\n\n## 二、资产规模与仓位验证推导\n根据季报数据，组合总规模为156.8亿元，乘以相应仓位比例，可推算出各类资产的理论市值。权益持仓总市值应等于156.8亿×72.5% = 113.68亿元；固收持仓总市值应等于156.8亿×18.3% = 28.6944亿元；现金及其他资产为156.8亿×9.2% = 14.4256亿元。三项之和恰为156.8亿元，逻辑自洽。进一步交叉验证：权益前十大市值合计86.8亿元，其占权益总市值比例为76.35%（各股票占权益仓位比加总），由此反推权益总市值为86.8亿 ÷ 76.35% ≈ 113.69亿元，与前述计算值113.68亿元吻合，差异源于小数点舍入。固收方面，国债、政金债、信用债与可转债规模相加为12.5+8.7+5.2+2.3 = 28.7亿元，与理论值28.69亿元基本一致，微幅偏差系四舍五入所致。上述推导验证了仓位比例与各分项市值的匹配性，数据质量可靠。\n\n## 三、前十大持仓集中度与风险评估\n前十大重仓股持仓市值合计86.8亿元，权益持仓总市值为113.68亿元，由此计算前十大持仓集中度为86.8 ÷ 113.68 ≈ 76.35%。该指标显著高于主动管理型基金的一般水平，意味着组合净值走势与少数核心标的紧密绑定。高集中度在本季度发挥了正向催化，半导体与新能源龙头的强势上涨贡献了可观的弹性收益；但反向审视，若苹果中心化的持仓遭遇行业轮动或个股负面事件，回撤幅度也将被放大。尤其消费板块的茅、中免已显现逆风，医药板块亦拖累显著，一旦成长板块动量衰减，组合将面临较突出的集中度风险。后续管理中，建议适度分散，或通过衍生工具对冲尾部风险，以平滑净值曲线。\n\n## 四、超额收益测算与Alpha归因分析\n组合Q2收益率为8.56%，基准收益率为5.23%，超额收益为3.33个百分点。业绩归因显示，权益贡献7.82个百分点，固收贡献0.74个百分点。结合仓位，可推算权益部分内部收益率约为7.82% ÷ 0.725 ≈ 10.79%，固收部分内部收益率约为0.74% ÷ 0.183 ≈ 4.04%。与基准构成相比，首先，组合显著超配权益（72.5% vs 基准65%），这是资产配置层面的主动偏离；其次，组合权益收益率10.79%大概率远优于同期沪深300指数（按基准倒推，沪深300收益率约在6%附近），表明权益内部的行业与个股选择创造了丰厚Alpha。具体而言，Alpha来源可拆解为：（1）行业配置效应——大幅超配新能源、半导体等Q2领涨赛道；（2）个股选择效应——重仓股中海光信息、中芯国际、宁德时代等均取得超20%涨幅，显著跑赢同行业均值；（3）固收部分通过久期管理和品种选择亦贡献微幅正向超额。但需注意，此类超额收益与集中度风险相伴而生，高Alpha的部分源头亦是高Beta的体现。\n\n## 五、组合特征综合评价\n纵观二季度运作，管理人大胆提升权益仓位并实施高集中度策略，精准捕捉了科技成长股的主升浪，从而实现了显著的超额收益，体现了对市场节奏与产业趋势较强的把握能力。然而，当前组合结构呈现出“高锐度”特征：前十大持仓占比逾七成半，新能源+半导体合计权重超37%，行业敞口相对集中；消费、医药等逆周期品种的负贡献已开始体现。展望后市，若成长风格面临均值回归或流动性转向，组合净值韧性将经受严峻考验。固收部分久期适中，可转债配置增添了权益弹性，整体风险可控但缓冲空间有限。建议后续再平衡中，适当收敛集中度，增加低相关性资产的配置，以巩固收益成果并提升组合的稳健性。\n\n综上所述，鹏程基金本季度通过积极资产配置与集中选股，在上涨行情中实现了3.33个百分点的超额收益，但其高集中度特征也埋藏了潜在回撤风险。未来超额收益的可持续性，高度依赖于对成长赛道节奏的持续掌控及风险敞口的动态优化。", "flash_score": {"score": 1.0, "hard": {"passed": 4, "total": 4}, "soft": {"passed": 2, "total": 2}}, "pro_score": {"score": 1.0, "hard": {"passed": 4, "total": 4}, "soft": {"passed": 2, "total": 2}}, "constraints": [{"id": "C10", "key": "T3.3-007#C10", "type": "hard", "tag": "F1", "description": "至少5个章节", "flash_pass": true, "flash_reason": "", "pro_pass": true, "pro_reason": ""}, {"id": "C11", "key": "T3.3-007#C11", "type": "soft", "tag": "S1", "description": "使用正式书面语，不得口语化", "flash_pass": true, "flash_reason": "输出全部使用正式书面语，无口语化表达，专业术语使用规范。", "pro_pass": true, "pro_reason": "parsed from malformed json"}, {"id": "C12", "key": "T3.3-007#C12", "type": "hard", "tag": "F1", "description": "2个二级标题", "flash_pass": true, "flash_reason": "", "pro_pass": true, "pro_reason": ""}, {"id": "C13", "key": "T3.3-007#C13", "type": "hard", "tag": "F6", "description": "开头第一个词必须是\"总结\"", "flash_pass": true, "flash_reason": "", "pro_pass": true, "pro_reason": ""}, {"id": "C14", "key": "T3.3-007#C14", "type": "soft", "tag": "F6", "description": "回答末尾必须包含一段总结", "flash_pass": true, "flash_reason": "输出末尾有明确的总结段落，归纳了前文核心要点且未引入新信息。", "pro_pass": true, "pro_reason": "模型输出最后一段是概括性总结，归纳了前文核心要点，并且简洁不引入新信息。"}, {"id": "C15", "key": "T3.3-007#C15", "type": "hard", "tag": "N2", "description": "5-8个段落", "flash_pass": true, "flash_reason": "", "pro_pass": true, "pro_reason": ""}]}}, "tier_scores": {"flash": {"T1": 0.8940740740740742, "T2": 0.9191919191919192, "T3": 0.8234848484848485, "overall": 0.8868333333333335}, "pro": {"T1": 0.8877777777777779, "T2": 0.9393939393939394, "T3": 0.8984848484848484, "overall": 0.9071666666666668}}};

        </div>
        <div class="score-bar">
          <div class="fill fill-pro" style="width:${ps*100}%"></div>
          <div class="label">${(ps*100).toFixed(0)}%</div>
        </div>
      </div>`;
    div.onclick = () => selectCase(cid);
    list.appendChild(div);
  });
}

let currentCid = null;

function escapeHtml(s) {
  const d = document.createElement("div");
  d.textContent = s;
  return d.innerHTML;
}

function selectCase(cid) {
  currentCid = cid;
  document.querySelectorAll(".case-item").forEach(el => {
    el.classList.toggle("active", el.dataset.cid === cid);
  });
  const c = DATA.cases[cid];
  const fs = c.flash_score, ps = c.pro_score;
  const main = document.getElementById("main");

  let consRows = "";
  c.constraints.forEach(con => {
    const isDiff = con.flash_pass !== con.pro_pass;
    const rowClass = isDiff ? "diff-row" : "";
    const fpClass = con.flash_pass === true ? "pass-true" : con.flash_pass === false ? "pass-false" : "pass-null";
    const ppClass = con.pro_pass === true ? "pass-true" : con.pro_pass === false ? "pass-false" : "pass-null";
    const fpText = con.flash_pass === true ? "PASS" : con.flash_pass === false ? "FAIL" : "N/A";
    const ppText = con.pro_pass === true ? "PASS" : con.pro_pass === false ? "FAIL" : "N/A";
    consRows += `<tr class="${rowClass}">
      <td>${escapeHtml(con.id)}</td>
      <td><span class="type-badge type-${con.type}">${con.type}</span></td>
      <td><span class="tag-badge">${escapeHtml(con.tag)}</span></td>
      <td>${escapeHtml(con.description)}</td>
      <td class="${fpClass}">${fpText}</td>
      <td class="${ppClass}">${ppText}</td>
      <td class="reason-cell" title="${escapeHtml(con.flash_reason)}">${escapeHtml(con.flash_reason)}</td>
      <td class="reason-cell" title="${escapeHtml(con.pro_reason)}">${escapeHtml(con.pro_reason)}</td>
    </tr>`;
  });

  main.innerHTML = `
    <div class="section">
      <div class="case-header">
        <h1>${cid}</h1>
        <span class="tier-badge tier-${c.tier}">${c.tier}</span>
      </div>
      <div class="score-summary">
        <div class="score-card score-card-flash">
          Flash: ${((fs.score||0)*100).toFixed(1)}%
          <div class="score-detail">Hard ${fs.hard?.passed||0}/${fs.hard?.total||0} · Soft ${fs.soft?.passed||0}/${fs.soft?.total||0}</div>
        </div>
        <div class="score-card score-card-pro">
          Pro: ${((ps.score||0)*100).toFixed(1)}%
          <div class="score-detail">Hard ${ps.hard?.passed||0}/${ps.hard?.total||0} · Soft ${ps.soft?.passed||0}/${ps.soft?.total||0}</div>
        </div>
      </div>
    </div>

    <div class="section">
      <h3>Prompt</h3>
      <div class="text-block">${escapeHtml(c.prompt)}</div>
    </div>

    <div class="section">
      <h3 class="collapsible" onclick="toggleCollapsible(this)">Context</h3>
      <div class="collapsible-content">
        <div class="text-block">${escapeHtml(c.context || "(no context)")}</div>
      </div>
    </div>

    <div class="section">
      <h3>Responses</h3>
      <div class="responses">
        <div class="response-col">
          <h4><span class="flash-color">ds-v4-flash</span> <span style="font-size:11px;color:#999">${c.flash_response.length} chars</span></h4>
          <div class="text-block">${escapeHtml(c.flash_response)}</div>
        </div>
        <div class="response-col">
          <h4><span class="pro-color">ds-v4-pro</span> <span style="font-size:11px;color:#999">${c.pro_response.length} chars</span></h4>
          <div class="text-block">${escapeHtml(c.pro_response)}</div>
        </div>
      </div>
    </div>

    <div class="section">
      <h3>
        Constraints (${c.constraints.length})
        <label class="filter-diff"><input type="checkbox" id="diff-only" onchange="filterDiff()"> Only show differences</label>
      </h3>
      <table id="cons-table">
        <thead>
          <tr>
            <th>ID</th><th>Type</th><th>Tag</th><th>Description</th>
            <th class="flash-color">Flash</th><th class="pro-color">Pro</th>
            <th class="flash-color">Flash Reason</th><th class="pro-color">Pro Reason</th>
          </tr>
        </thead>
        <tbody>${consRows}</tbody>
      </table>
    </div>`;
}

function toggleCollapsible(el) {
  el.classList.toggle("open");
  const content = el.nextElementSibling;
  content.classList.toggle("show");
}

function filterDiff() {
  const only = document.getElementById("diff-only")?.checked;
  document.querySelectorAll("#cons-table tbody tr").forEach(tr => {
    if (only) {
      tr.style.display = tr.classList.contains("diff-row") ? "" : "none";
    } else {
      tr.style.display = "";
    }
  });
}

// Filter buttons
document.querySelectorAll(".filter-btn").forEach(btn => {
  btn.onclick = () => {
    document.querySelectorAll(".filter-btn").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
    renderSidebar(btn.dataset.tier, document.getElementById("search").value);
  };
});

document.getElementById("search").oninput = (e) => {
  const active = document.querySelector(".filter-btn.active");
  renderSidebar(active?.dataset.tier || "all", e.target.value);
};

// Keyboard navigation
document.addEventListener("keydown", e => {
  if (e.target.tagName === "INPUT") return;
  const items = [...document.querySelectorAll(".case-item")];
  if (!items.length) return;
  const idx = items.findIndex(el => el.dataset.cid === currentCid);
  if (e.key === "ArrowDown" || e.key === "j") {
    e.preventDefault();
    const next = items[Math.min(idx + 1, items.length - 1)];
    next?.click();
    next?.scrollIntoView({block: "nearest"});
  } else if (e.key === "ArrowUp" || e.key === "k") {
    e.preventDefault();
    const prev = items[Math.max(idx - 1, 0)];
    prev?.click();
    prev?.scrollIntoView({block: "nearest"});
  }
});

renderSidebar("all", "");
</script>
</body>
</html>
